<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likha | Sign-up</title>
    <link rel="stylesheet" href="">
</head>
<body>
    <!-- This is a the top part of our sign-up page-->
        <div>
            <!--Insert the logo here if ever-->
            <h1>Likha</h1>
            <button>Login</button>
        </div>

        <form>
            <h1>Sign-up</h1>
                <br><label>First Name</label>
                <br><input type="text" name="first-name" id="f-name" placeholder="First name" required>
                <br><label>Last Name</label>
                <br><input type="text" name="last-name" id="l-name" placeholder="Last name">
                <br><label>Username</label>
                <br><input type="text" name="username" id="u-name" placeholder="Username" required>
                <br><label>Email</label>
                <br><input type="text" name="email" id="email" placeholder="Email" required>
                <br><label>Password</label>
                <br><input type="password" name="pass" id="passw" placeholder="Password" required>
                <br><label>Confirm Password</label>
                <br><input type="password" name="confirm-pass" id="c-pass" placeholder="Confirm Password" required><br>
                <br><button>Register</button><br><br> <!-- double br for more spacing-->
        </form>
</body>
</html>
